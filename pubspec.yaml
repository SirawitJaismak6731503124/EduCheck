name: edu_check
description: University Check-in & Reflection MVP — GPS + QR attendance with learning reflections.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local storage — SQLite (native) / SharedPreferences (web fallback)
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.3.2

  # Location
  geolocator: ^12.0.0

  # QR / Barcode scanner
  mobile_scanner: ^5.2.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
